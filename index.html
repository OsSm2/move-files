<!DOCTYPE html>
<html>
<head>
    <title>Move Files</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; background: #121212; color: #e0e0e0; overflow: hidden; }
        #toolbar { padding: 10px 15px; background: #1f1f1f; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid #333; height: 50px; }
        #app-body { display: flex; flex: 1; overflow: hidden; }
        #main-viewer { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; background: #000; }
        #viewer { max-width: 100%; max-height: 100%; object-fit: contain; }
        #sidebar { width: 300px; background: #181818; border-left: 1px solid #333; display: flex; flex-direction: column; padding: 15px; }
        .dest-item { display: flex; align-items: center; background: #2a2a2a; margin-bottom: 8px; border-radius: 4px; padding: 8px 10px; cursor: pointer; border: 1px solid transparent; }
        .dest-item:hover { background: #333; border-color: #444; }
        .shortcut-key { font-weight: bold; color: #0078d4; margin-right: 10px; font-family: monospace; background: #000; padding: 2px 6px; border-radius: 3px; }
        .dest-info { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .remove-btn { color: #888; cursor: pointer; padding: 2px 8px; font-weight: bold; }
        .remove-btn:hover { color: #ff5f56; }
        button { padding: 8px 15px; cursor: pointer; background: #3d3d3d; color: white; border: none; border-radius: 4px; }
        #btnSource { background: #0078d4; }
        #btnUndo { background: #6c757d; }
        #btnUndo:disabled { opacity: 0.3; }
        #stats { font-size: 0.8em; color: #888; margin-top: auto; padding-top: 10px; border-top: 1px solid #333; }
    </style>
</head>
<body>
    <div id="toolbar">
        <button id="btnSource">Open Source</button>
        <button id="btnUndo" disabled>Undo</button>
        <div style="flex: 1; text-align: center; font-size: 0.8em; color: #888;">↑ Prev | ↓ Next</div>
    </div>
    <div id="app-body">
        <div id="main-viewer"><div id="mediaContainer"></div></div>
        <div id="sidebar">
            <h3 style="margin: 0 0 15px 0;">Destinations</h3>
            <div id="destList" style="flex: 1; overflow-y: auto;"></div>
            <button id="btnAddDest" style="background: #2b8041; margin-top: 10px;">+ Add Folders</button>
            <div id="stats">Ready</div>
        </div>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
